<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="PopupInfo.js" defer></script>
</head>
<template id="popup-template">
   <style>
    .wrapper { position: relative; display: inline-block; margin: 60px;}
            .info {
                visibility: hidden; width: 200px; background-color: #333; color: #fff;
                text-align: center; padding: 10px; border-radius: 6px;
                position: absolute; z-index: 1; bottom: 125%; left: 50%;
                margin-left: -100px; opacity: 0; transition: opacity 0.3s;
            }
            .icon:hover + .info { visibility: visible; opacity: 1; }
   </style>
   <span class="wrapper">
     <span class="icon">
        <img src="" alt="Imagem do popup" width="30px">
     </span>
     <span class="info">
        <slot name="text-info"> </slot>
     </span>
   </span>
</template>
<body>
    <popup-info>
        <p slot="text-info">informações valiosas</p>
    </popup-info>
</body>
</html>
